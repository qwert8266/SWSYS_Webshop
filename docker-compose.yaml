services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # CMD format for health check command
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 5s

  db:
    image: docker.io/mongodb/mongodb-community-server:latest
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  mongo-data:
  mongo-config: