services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # CMD format for health check command
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3001/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: docker.io/mongodb/mongodb-community-server:latest
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    volumes:
        - mailpit-data:/data
    ports:
        - 8025:8025   # Web-Oberfläche
        - 1025:1025   # SMTP-Port
    environment:
        TZ: Europe/Berlin
        MP_MAX_MESSAGES: 5000
        MP_DATABASE: /data/mailpit.db

volumes:
  mongo-data:
  mongo-config:
  mailpit-data: